<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuario</title>
</head>
<body>
    <h2>Cadastro de Usuario</h2>

    <form>
        <label for="nome">Nome completo:</label>
        <br>
        <input type="text" id="nome" name="nome">
        <br><br>

        <label for="email">E-mail:</label>
        <br>
        <input type="email" id="email" name="email">
        <br><br>

        <label for="senha">Senha:</label>
        <br>
        <input type="password" id="senha" name="senha">
        <br><br>

        <label for="confirmar-senha">Confirmar senha:</label>
        <br>
        <input type="password" id="confirmar-senha" name="confirmar-senha">
        <br><br>

        <label for="nascimento">Data de nascimento:</label>
        <br>
        <input type="date" id="nascimento" name="nascimento">
        <br><br>

        <label>Genero:</label>
        <br>
        <input type="radio" id="feminino" name="genero" value="feminino">
        <label for="feminino">Feminino</label>
        <br>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label>
        <br>
        <input type="radio" id="outro" name="genero" value="outro">
        <label for="outro">Outro</label>
        <br><br>

        <label>Interesses:</label>
        <br>

        <label for="tecnologia">Tecnologia</label>
                      <br>
        <input type="checkbox" id="aaaaa" name="aaaaaa" value="aaaaa">
        <label for="esportes">Esportes</label>
                       <br>
        <input type="checkbox" id="bbbb" name="bbbbbs" value="bbbbb">
        <label for="musica">Musica</label>
        <br><br>

                  <label for="pais">Pais:</label>
        <br>
        <select id="pais" name="pais">
            <option value="bbbbb">Brasil</option>
            <option value="argentina">Argentina</option>
            <option value="chile">Chile</option>
                       <option value="portugal">Portugal</option>
        </select>
        <br><br>

                            <input type="checkbox" id="termos" name="termos">
        <label for="termos">Aceito os termos de uso</label>
        <br><br>

        <button type="submit">Criar Conta</button>
        <br><br>

        <a href="login.html">Ja tenho conta</a>
        <br><br>
    </form>

    <a href="login.html"><button type="button">Voltar para Login</button></a>
</body>
</html>
